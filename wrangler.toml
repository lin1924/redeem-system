name = "redeem-system"
main = "worker.js"
compatibility_date = "2024-12-18"

# KV 命名空间绑定（用户需要自己创建并填写 ID）
[[kv_namespaces]]
binding = "REDEEM_CODES"
id = "YOUR_REDEEM_CODES_KV_ID"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "YOUR_RATE_LIMIT_KV_ID"

# 环境变量（用户需要自己填写）
[vars]
ADMIN_PASSWORD = "your_password_here"
TURNSTILE_SITE_KEY = ""
TURNSTILE_SECRET_KEY = ""
